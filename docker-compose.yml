version: '3.8'

services:
  # ============================================================
  # PostgreSQL Database Service
  # ============================================================
  db:
    image: postgres:15-alpine
    container_name: smart_souvenir_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_souvenir
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - souvenir_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d smart_souvenir"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ============================================================
  # Express.js Backend API Service
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_souvenir_api
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: smart_souvenir
      DB_USER: admin
      DB_PASSWORD: admin123
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - souvenir_net

  # ============================================================
  # Nginx Frontend Static Server
  # ============================================================
  frontend:
    image: nginx:1.25-alpine
    container_name: smart_souvenir_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - souvenir_net
    depends_on:
      - backend

  # ============================================================
  # ESP32 RFID Hardware Emulator Service
  # ============================================================
  esp32-emulator:
    build:
      context: ./esp32-emulator
      dockerfile: Dockerfile
    container_name: smart_souvenir_esp32
    restart: unless-stopped
    environment:
      API_URL: http://backend:3000
      EMULATOR_PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - backend
    networks:
      - souvenir_net

# ============================================================
# Docker Networks
# ============================================================
networks:
  souvenir_net:
    driver: bridge
    name: smart_souvenir_network

# ============================================================
# Docker Volumes
# ============================================================
volumes:
  pgdata:
    name: smart_souvenir_pgdata
